<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configuratore Kit — [ATTIVITA]</title>
<style>
  :root {
    --bg: #0e1116;
    --surface: #171b22;
    --surface-2: #212630;
    --border: #2c333f;
    --text: #f2f5f9;
    --muted: #9aa4b2;
    --accent: #1e5bd6;
    --radius: 12px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .sub { font-size: 13px; color: var(--muted); }
  main { display: flex; gap: 24px; padding: 24px; align-items: flex-start; flex-wrap: wrap; }
  #stage {
    flex: 1 1 420px; min-width: 300px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; justify-content: center;
  }
  canvas { max-width: 100%; height: auto; border-radius: 8px; }
  .panel {
    flex: 0 0 300px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .panel h2 { font-size: 14px; margin: 0 0 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .zone { margin-bottom: 18px; }
  .zone label { display: block; font-size: 14px; margin-bottom: 6px; }
  .zone-row { display: flex; align-items: center; gap: 12px; }
  input[type=color] {
    width: 56px; height: 40px; border: 1px solid var(--border);
    border-radius: 8px; background: none; padding: 2px; cursor: pointer;
  }
  .swatch-val { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  #err {
    display: none; margin: 0 24px 24px; padding: 12px 16px; border-radius: 8px;
    background: #3a1d1d; border: 1px solid #6b2b2b; color: #ffd7d7; font-size: 14px;
  }
  #loading { color: var(--muted); font-size: 14px; padding: 40px; }
</style>
</head>
<body>
<header>
  <h1>Configuratore Kit</h1>
  <span class="sub">[ATTIVITA] — personalizza i colori del tuo completo</span>
</header>

<div id="err"></div>

<main>
  <div id="stage">
    <div id="loading">Caricamento anteprima…</div>
    <canvas id="c" width="1067" height="1600" hidden></canvas>
  </div>

  <aside class="panel">
    <h2>Colori capi</h2>
    <div class="zone">
      <label for="maglia">Maglia</label>
      <div class="zone-row">
        <input type="color" id="maglia" value="#1e5bd6" />
        <span class="swatch-val" id="maglia-val"></span>
      </div>
    </div>
    <div class="zone">
      <label for="pantaloncini">Pantaloncini</label>
      <div class="zone-row">
        <input type="color" id="pantaloncini" value="#ffffff" />
        <span class="swatch-val" id="pantaloncini-val"></span>
      </div>
    </div>
    <div class="zone">
      <label for="calze">Calze</label>
      <div class="zone-row">
        <input type="color" id="calze" value="#1e5bd6" />
        <span class="swatch-val" id="calze-val"></span>
      </div>
    </div>
  </aside>
</main>

<script>
"use strict";
// Zone reali del mockup. Sub-zone colletto/maniche = enhancement futuro (MT-2D.2 report).
var GARMENTS = ["maglia", "pantaloncini", "calze"];
var ASSET_DIR = "assets-mockup/derived/web/";
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");
var W = canvas.width, H = canvas.height;
var imgs = {};

function showError(msg) {
  var e = document.getElementById("err");
  e.textContent = "Impossibile caricare l'anteprima: " + msg;
  e.style.display = "block";
  var l = document.getElementById("loading");
  if (l) l.textContent = "Anteprima non disponibile.";
  window.__error = msg;
}

function load(src) {
  return new Promise(function (resolve, reject) {
    var i = new Image();
    i.onload = function () { resolve(i); };
    i.onerror = function () { reject(new Error(src)); };
    i.src = src;
  });
}

// Colori da URL (?maglia=RRGGBB) per verifica headless, altrimenti dai picker.
var params = new URLSearchParams(location.search);
GARMENTS.forEach(function (g) {
  var v = params.get(g);
  if (v) document.getElementById(g).value = "#" + v.replace("#", "");
});

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(imgs.base, 0, 0, W, H); // base ombreggiata: sfondo + scarpe + capi
  var tmp = document.createElement("canvas");
  tmp.width = W; tmp.height = H;
  var t = tmp.getContext("2d");
  GARMENTS.forEach(function (g) {
    var color = document.getElementById(g).value;
    document.getElementById(g + "-val").textContent = color.toUpperCase();
    t.globalCompositeOperation = "source-over";
    t.clearRect(0, 0, W, H);
    t.drawImage(imgs.base, 0, 0, W, H);        // base ombreggiata
    t.globalCompositeOperation = "multiply";   // colore * ombreggiatura = fotorealistico
    t.fillStyle = color;
    t.fillRect(0, 0, W, H);
    t.globalCompositeOperation = "destination-in"; // ritaglia sulla maschera del capo
    t.drawImage(imgs["mask_" + g], 0, 0, W, H);
    ctx.drawImage(tmp, 0, 0);                   // sovrapponi capo ricolorato
  });
  window.__rendered = true;
}

Promise.all([
  load(ASSET_DIR + "shading_base.jpg").then(function (i) { imgs.base = i; })
].concat(GARMENTS.map(function (g) {
  return load(ASSET_DIR + "mask_" + g + ".png").then(function (i) { imgs["mask_" + g] = i; });
}))).then(function () {
  var l = document.getElementById("loading");
  if (l) l.remove();
  canvas.hidden = false;
  render();
  GARMENTS.forEach(function (g) {
    document.getElementById(g).addEventListener("input", render);
  });
}).catch(function (e) {
  showError(e.message);
});
</script>
</body>
</html>
